openapi: 3.0.3
info:
  title: IP Inventory API
  version: 0.1.0
servers:
  - url: /

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service health status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                healthy:
                  value:
                    statusCode: "0"
                    statusMessage: healthy
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ip-inventory/ip-pool:
    post:
      summary: Add IP addresses to the inventory pool
      operationId: addIpPool
      description: |
        Adds one or more IPv4 or IPv6 addresses to the IP inventory pool.

        Each item must include `ip` and `ipType`. The `ipType` value is parsed case-insensitively as `IPv4` or `IPv6`.
        Extra JSON fields are ignored by the current DTO parser. Duplicate pool entries are ignored by the database and
        still result in a successful response when the rest of the request is valid.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IpPoolRequest"
            examples:
              mixedIpPool:
                value:
                  ipAddresses:
                    - ip: 95.44.73.19
                      ipType: IPv4
                    - ip: 2a01:5a9:1a4:95c::1
                      ipType: IPv6
      responses:
        "200":
          description: The IP addresses were accepted for the pool.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                success:
                  $ref: "#/components/examples/SuccessfulOperation"
        "400":
          description: The request JSON, declared IP type, or one of the declared IP addresses is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                invalidJson:
                  value:
                    statusCode: "1"
                    statusMessage: Invalid JSON request body
                emptyAddresses:
                  value:
                    statusCode: "1"
                    statusMessage: Request field 'ipAddresses' must be a non-empty array
                invalidIpType:
                  value:
                    statusCode: "1"
                    statusMessage: "Invalid ipType: IPv5"
                invalidIp:
                  value:
                    statusCode: "1"
                    statusMessage: "Invalid IP address for declared ipType: 999.1.1.1"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ip-inventory/reserve-ip:
    post:
      summary: Reserve IP addresses
      operationId: reserveIp
      description: |
        Reserves an available IP address for the given service and requested address family.

        `ipType` is parsed case-insensitively as `IPv4`, `IPv6`, or `Both`. With `Both`, the current implementation
        reserves one IPv4 address and one IPv6 address in the same transaction. If either requested family has no
        available address, the whole reservation request fails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IpReserveRequest"
            examples:
              reserveIpv4:
                value:
                  serviceId: service-a
                  ipType: IPv4
              reserveBoth:
                value:
                  serviceId: service-a
                  ipType: Both
      responses:
        "200":
          description: IP addresses were reserved for the service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpAddressesResponse"
              examples:
                reservedBoth:
                  value:
                    ipAddresses:
                      - ip: 95.44.73.19
                        ipType: IPv4
                      - ip: 2a01:5a9:1a4:95c::1
                        ipType: IPv6
        "400":
          description: The request JSON, requested IP type, or reservation request is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                invalidJson:
                  value:
                    statusCode: "1"
                    statusMessage: Invalid JSON request body
                invalidIpType:
                  value:
                    statusCode: "1"
                    statusMessage: Failed to parse ip type
                unavailable:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to reserve IP address; reason: no available IPv4 addresses"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ip-inventory/assign-ip-serviceId:
    post:
      summary: Assign reserved IP addresses to a service
      operationId: assignIpServiceId
      description: |
        Assigns one or more reserved IP addresses to the given service.

        The current parser accepts the task shape, where each `ipAddresses` item is an object with an `ip` field. It also
        still accepts raw string items for compatibility with earlier local curl examples. Each IP must already be
        reserved for the same service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IpAssignmentRequest"
            examples:
              assignIps:
                value:
                  serviceId: service-a
                  ipAddresses:
                    - ip: 95.44.73.19
                    - ip: 2a01:5a9:1a4:95c::1
      responses:
        "200":
          description: The IP addresses were assigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                success:
                  $ref: "#/components/examples/SuccessfulOperation"
        "400":
          description: The request JSON, IP address list, service, reservation, or assignment state is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                emptyAddresses:
                  value:
                    statusCode: "1"
                    statusMessage: Request field 'ipAddresses' must be a non-empty array
                invalidIp:
                  value:
                    statusCode: "1"
                    statusMessage: "Invalid IP address: not-an-ip"
                serviceNotFound:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to assign IP address; reason: service not found"
                notReserved:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to assign IP address; reason: ip address 95.44.73.19 not reserved"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ip-inventory/terminate-ip-serviceId:
    post:
      summary: Terminate IP assignments for a service
      operationId: terminateIpServiceId
      description: |
        Removes one or more assigned IP addresses from the given service, returning them to the available pool.

        The current parser accepts the task shape, where each `ipAddresses` item is an object with an `ip` field. It also
        still accepts raw string items for compatibility with earlier local curl examples.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IpAssignmentRequest"
            examples:
              terminateIps:
                value:
                  serviceId: service-a
                  ipAddresses:
                    - ip: 95.44.73.19
      responses:
        "200":
          description: The IP assignments were terminated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                success:
                  $ref: "#/components/examples/SuccessfulOperation"
        "400":
          description: The request JSON, IP address list, service, or assignment state is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                serviceNotFound:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to terminate IP address; reason: failed to find service"
                notAssigned:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to terminate IP address; reason: the ip 95.44.73.19 is not available"
                differentService:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to terminate IP address; reason: the ip 95.44.73.19 is reserved for another service"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ip-inventory/serviceId-change:
    post:
      summary: Change a service identifier
      operationId: changeServiceId
      description: |
        Renames an existing service identifier. Assigned IPs and reservations remain linked because the database stores
        references to the internal service row.

        If `serviceIdOld` and `serviceId` are the same string, the repository logs the no-op and returns success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeServiceIdRequest"
            examples:
              changeService:
                value:
                  serviceIdOld: service-a
                  serviceId: service-b
      responses:
        "200":
          description: The service identifier was changed, or the requested change was a no-op.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                success:
                  $ref: "#/components/examples/SuccessfulOperation"
        "400":
          description: The request JSON, source service, or target service is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                serviceNotFound:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to change service id; reason: service (service-a) does not exist"
                serviceAlreadyExists:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to change service id; reason: service (service-b) already exists"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ip-inventory/serviceId:
    get:
      summary: Get assigned IP addresses for a service
      operationId: getServiceId
      parameters:
        - name: serviceId
          in: query
          required: true
          schema:
            type: string
          description: Service identifier to look up. An empty value is rejected by the handler.
          example: service-a
      responses:
        "200":
          description: Assigned IP addresses for the service.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpAddressesResponse"
              examples:
                assignedIps:
                  value:
                    ipAddresses:
                      - ip: 95.44.73.19
                        ipType: IPv4
                      - ip: 2a01:5a9:1a4:95c::1
                        ipType: IPv6
        "400":
          description: The query parameter is missing, empty, or the service does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                missingServiceId:
                  value:
                    statusCode: "1"
                    statusMessage: Missing serviceId query parameter
                emptyServiceId:
                  value:
                    statusCode: "1"
                    statusMessage: serviceId cannot be empty
                serviceNotFound:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to get assigned ips for service; reason: service not found"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ip-inventory/available-ips:
    get:
      summary: List available IP addresses
      operationId: getAvailableIps
      description: Returns every IP address in the pool that is not assigned and not reserved.
      responses:
        "200":
          description: Available IP addresses.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpAddressesResponse"
              examples:
                availableIps:
                  value:
                    ipAddresses:
                      - ip: 95.44.73.19
                        ipType: IPv4
                      - ip: 2a01:5a9:1a4:95c::1
                        ipType: IPv6
        "400":
          description: The repository could not read available IP addresses.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                dbNotInitialized:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to get available IP addresses; reason: database is not initialized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /ip-inventory/all-reserved-ips:
    get:
      summary: List all reserved IP addresses
      operationId: getAllReservedIps
      description: Returns every currently reserved IP address and the service it is reserved for.
      responses:
        "200":
          description: Reserved IP addresses.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservedIpsResponse"
              examples:
                reservedIps:
                  value:
                    reservedIps:
                      - serviceId: service-a
                        ip: 95.44.73.19
                        ipType: IPv4
                        expirationTime: 1715700000
                      - serviceId: service-b
                        ip: 2a01:5a9:1a4:95c::1
                        ipType: IPv6
                        expirationTime: 1715700000
        "400":
          description: The repository could not read reservations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                dbNotInitialized:
                  value:
                    statusCode: "1"
                    statusMessage: "Failed to get reserved IP addresses; reason: database is not initialized"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  responses:
    InternalServerError:
      description: An unhandled server error occurred in the endpoint guard.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StatusResponse"
          examples:
            internalServerError:
              value:
                statusCode: "1"
                statusMessage: internal server error
    FileNotFound:
      description: The requested static file was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/StatusResponse"
          examples:
            fileNotFound:
              value:
                statusCode: "1"
                statusMessage: file not found

  examples:
    SuccessfulOperation:
      value:
        statusCode: "0"
        statusMessage: Successful operation. OK

  schemas:
    IpPoolRequest:
      type: object
      required:
        - ipAddresses
      properties:
        ipAddresses:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/IpAddressWithType"

    IpReserveRequest:
      type: object
      required:
        - serviceId
        - ipType
      properties:
        serviceId:
          type: string
          example: service-a
        ipType:
          type: string
          description: Parsed case-insensitively by the handler.
          enum:
            - IPv4
            - IPv6
            - Both

    IpAssignmentRequest:
      type: object
      required:
        - serviceId
        - ipAddresses
      properties:
        serviceId:
          type: string
          example: service-a
        ipAddresses:
          type: array
          minItems: 1
          items:
            oneOf:
              - $ref: "#/components/schemas/IpAddressOnly"
              - type: string
                description: Also accepted by the current parser for compatibility.
                example: 95.44.73.19

    ChangeServiceIdRequest:
      type: object
      required:
        - serviceIdOld
        - serviceId
      properties:
        serviceIdOld:
          type: string
          example: service-a
        serviceId:
          type: string
          example: service-b

    IpAddressesResponse:
      type: object
      required:
        - ipAddresses
      properties:
        ipAddresses:
          type: array
          items:
            $ref: "#/components/schemas/IpAddressWithType"

    ReservedIpsResponse:
      type: object
      required:
        - reservedIps
      properties:
        reservedIps:
          type: array
          items:
            $ref: "#/components/schemas/ReservedIp"

    ReservedIp:
      type: object
      required:
        - serviceId
        - ip
        - ipType
        - expirationTime
      properties:
        serviceId:
          type: string
          example: service-a
        ip:
          type: string
          example: 95.44.73.19
        ipType:
          type: string
          enum:
            - IPv4
            - IPv6
        expirationTime:
          type: integer
          format: int64
          description: Unix timestamp stored for the reservation expiration time.
          example: 1715700000

    IpAddressWithType:
      type: object
      required:
        - ip
        - ipType
      properties:
        ip:
          type: string
          examples:
            - 95.44.73.19
            - 2a01:5a9:1a4:95c::1
        ipType:
          type: string
          description: Parsed case-insensitively in requests and serialized as `IPv4` or `IPv6` in responses.
          enum:
            - IPv4
            - IPv6

    IpAddressOnly:
      type: object
      required:
        - ip
      properties:
        ip:
          type: string
          example: 95.44.73.19

    StatusResponse:
      type: object
      required:
        - statusCode
        - statusMessage
      properties:
        statusCode:
          type: string
          enum:
            - "0"
            - "1"
        statusMessage:
          type: string
